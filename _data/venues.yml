# Conference/journal abbreviations for publication pages.
# Colors use Material Design shades verified for WCAG AA contrast (≥4.5:1).
# Light backgrounds use text_color: "#212121", dark backgrounds use text_color: "#ffffff".
# Format:
# "ABBR":
#   url: https://example.com
#   color: "#hexcolor"
#   text_color: "#hexcolor"

# --- MDE / MODELS family (green) ---

